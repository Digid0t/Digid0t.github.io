<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KI‑Stammtisch Pro</title>
  <meta name="description" content="Moderierte KI-Diskussionen mit bis zu 5 LLM-Modellen.">
  <meta name="theme-color" content="#080d0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KI-Stammtisch">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080d0b;--s1:#101a16;--s2:#182820;--s3:#1e3229;
  --p:#0fbe84;--pg:rgba(15,190,132,.2);--pd:rgba(15,190,132,.08);
  --b:#1f3c32;--txt:#f0f5f1;--mu:#7a9e8c;--mu2:#4a6e5c;
  --warn:#f0b429;--err:#f04545;
  --r1:.3rem;--r2:.5rem;--r3:.875rem;--r4:1.25rem;
  --font:'Inter',system-ui,sans-serif;
  --hh:3rem;--bn:3.5rem;
  --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;min-width:0;word-break:break-word}
html{height:100%;-webkit-text-size-adjust:100%}
body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);line-height:1.5;overscroll-behavior:none;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:1500px;margin:0 auto;overflow:hidden}
/* HEADER */
.hdr{flex-shrink:0;height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;border-bottom:1px solid var(--b);background:rgba(8,13,11,.97);backdrop-filter:blur(14px);z-index:50}
.logo{display:flex;align-items:center;gap:.45rem;font-size:.875rem;font-weight:800;color:var(--txt);letter-spacing:-.02em;white-space:nowrap;user-select:none}
.logo-mark{width:1.5rem;height:1.5rem;border-radius:.375rem;background:linear-gradient(135deg,var(--p),#0a9966);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:900;color:#000;flex-shrink:0}
.desk-nav{display:none;align-items:center;gap:.15rem}
.nv{background:transparent;border:1px solid transparent;color:var(--mu);padding:.3rem .75rem;border-radius:var(--r2);cursor:pointer;font-family:var(--font);font-size:.7rem;font-weight:600;transition:all .18s;white-space:nowrap}
.nv:hover{color:var(--txt);background:var(--s1)}
.nv.active{color:var(--p);border-color:var(--b);background:var(--s2)}
/* VIEWS */
.vs{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;animation:fadeIn .18s ease}
.view.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
/* BOTTOM NAV */
.bnav{flex-shrink:0;display:flex;background:rgba(8,13,11,.97);border-top:1px solid var(--b);backdrop-filter:blur(14px);padding-bottom:var(--sb);z-index:50}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.18rem;background:transparent;border:none;color:var(--mu2);font-family:var(--font);font-size:.42rem;font-weight:700;cursor:pointer;padding:.6rem 0;transition:color .15s;text-transform:uppercase;letter-spacing:.06em;-webkit-tap-highlight-color:transparent}
.bn svg{width:1.1rem;height:1.1rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bn.active{color:var(--p)}
.bn.active svg{filter:drop-shadow(0 0 5px var(--p))}
/* SCROLLABLE */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}
/* TABLE MOBILE */
.tbl-m{flex:1;display:flex;flex-direction:column;overflow:hidden}
.seats-grid{flex:1;overflow-y:auto;padding:.75rem;display:grid;grid-template-columns:1fr 1fr;gap:.5rem;align-content:start}
.scard{background:var(--s1);border:1.5px solid var(--b);border-radius:var(--r3);padding:.7rem;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .1s;display:flex;flex-direction:column;gap:.3rem;position:relative;-webkit-tap-highlight-color:transparent;min-height:4.75rem}
.scard:active{transform:scale(.96)}
.scard.running{border-color:var(--p);box-shadow:0 0 10px var(--pg)}
.scard.fallback{border-color:var(--warn)}
.sc-av{width:1.625rem;height:1.625rem;border-radius:.35rem;background:var(--pd);border:1px solid rgba(15,190,132,.15);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.55rem;color:var(--p);flex-shrink:0}
.scard.running .sc-av{border-color:var(--p);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 var(--pg)}50%{box-shadow:0 0 0 5px transparent}}
.sc-role{font-size:.52rem;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.06em}
.sc-model{font-size:.52rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-dot{position:absolute;top:.45rem;right:.45rem;width:.33rem;height:.33rem;border-radius:50%;background:var(--b)}
.scard.running .sc-dot{background:var(--p);box-shadow:0 0 4px var(--p)}
.mob-bar{flex-shrink:0;padding:.6rem .75rem;border-top:1px solid var(--b);background:rgba(8,13,11,.97);display:flex;flex-direction:column;gap:.4rem}
.mob-ta{width:100%;background:var(--s1);border:1px solid var(--b);color:var(--txt);font-family:var(--font);font-size:.875rem;padding:.5rem .75rem;border-radius:var(--r2);resize:none;outline:none;min-height:2.5rem;max-height:6rem;line-height:1.5;transition:border-color .2s}
.mob-ta:focus{border-color:var(--p)}
.bar-row{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.syslog{flex:1;font-size:.6rem;color:var(--p);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.85}
/* TABLE DESKTOP */
.tbl-d{display:none;flex:1;position:relative;background:radial-gradient(ellipse 90% 80% at 50% 50%,#122118 0%,#080d0b 100%)}
.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:76%;height:58%;border:2px solid rgba(15,190,132,.07);border-radius:4.5rem;pointer-events:none}
.sabs{position:absolute;inset:0;pointer-events:none}
.seat-d{position:absolute;pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer;transform:translate(-50%,-50%);transition:all .25s}
.seat-d:nth-child(1){top:10%;left:50%}
.seat-d:nth-child(2){top:50%;left:10%}
.seat-d:nth-child(3){top:50%;left:90%}
.seat-d:nth-child(4){top:90%;left:28%}
.seat-d:nth-child(5){top:90%;left:72%}
.dav{width:2.875rem;height:2.875rem;border-radius:.6rem;background:var(--s1);border:2px solid var(--b);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;color:var(--mu);transition:all .25s}
.seat-d:hover .dav{border-color:var(--p);box-shadow:0 0 18px var(--pg);color:var(--p)}
.seat-d.running .dav{border-color:var(--p);color:var(--p);animation:ringpls 1.5s infinite}
.seat-d.fallback .dav{border-color:var(--warn);color:var(--warn)}
@keyframes ringpls{0%{box-shadow:0 0 0 0 var(--pg)}70%{box-shadow:0 0 0 14px transparent}100%{box-shadow:0 0 0 0 transparent}}
.dlabel{background:rgba(8,13,11,.92);padding:.18rem .5rem;border-radius:var(--r1);border:1px solid var(--b);text-align:center;max-width:7rem}
.dlabel .dr{font-size:.48rem;color:var(--p);font-weight:700;text-transform:uppercase}
.dlabel .dm{font-size:.44rem;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dbadge{position:absolute;top:-.7rem;font-size:.44rem;padding:.1rem .3rem;border-radius:var(--r1);background:var(--s1);border:1px solid var(--b);white-space:nowrap;font-weight:700;display:none}
.dbadge.warn{border-color:var(--warn);color:var(--warn)}
.console{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);z-index:10;width:44%;max-width:440px;background:rgba(14,24,19,.92);border:1px solid var(--b);border-radius:var(--r4);padding:1.125rem;backdrop-filter:blur(16px)}
.con-ta{width:100%;background:transparent;border:none;color:var(--txt);font-family:var(--font);font-size:.875rem;resize:none;min-height:4.5rem;max-height:8rem;outline:none;line-height:1.6}
.con-foot{display:flex;justify-content:space-between;align-items:center;margin-top:.6rem;border-top:1px solid var(--b);padding-top:.6rem;gap:.5rem}
/* BUTTONS */
.btn{background:var(--p);color:#050b07;border:none;padding:.5rem 1rem;border-radius:var(--r2);font-weight:700;cursor:pointer;font-family:var(--font);font-size:.75rem;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover:not(:disabled){opacity:.88;box-shadow:0 0 16px var(--pg)}
.btn:active:not(:disabled){transform:scale(.96)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:transparent;border:1px solid var(--b);color:var(--mu);padding:.5rem 1rem;border-radius:var(--r2);cursor:pointer;font-family:var(--font);font-size:.75rem;transition:all .15s;white-space:nowrap}
.btn-g:hover{border-color:var(--mu);color:var(--txt)}
.btn-i{background:transparent;border:1px solid var(--b);color:var(--mu);width:1.75rem;height:1.75rem;border-radius:var(--r1);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s;flex-shrink:0}
.btn-i:hover{color:var(--p);border-color:var(--p)}
.btn-i svg{width:.8rem;height:.8rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-c{display:inline-flex;align-items:center;gap:.2rem;background:var(--pd);border:1px solid rgba(15,190,132,.18);color:var(--p);padding:.18rem .45rem;border-radius:var(--r1);font-family:var(--font);font-size:.58rem;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0}
.btn-c:hover{background:rgba(15,190,132,.14)}
.btn-c svg{width:.75rem;height:.75rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* MODEL PICKER */
.mpick-hdr{padding:.75rem 1rem;border-bottom:1px solid var(--b)}
.mp-search{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--txt);padding:.55rem .8rem;border-radius:var(--r2);font-family:var(--font);font-size:.8rem;outline:none;transition:border-color .2s}
.mp-search:focus{border-color:var(--p)}
.tags-row{display:flex;gap:.3rem;flex-wrap:wrap;padding:.5rem 1rem .35rem;border-bottom:1px solid var(--b)}
.tag{padding:.18rem .55rem;border-radius:var(--r1);font-size:.58rem;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;user-select:none}
.tag.free{background:rgba(15,190,132,.1);color:#0fbe84;border-color:rgba(15,190,132,.18)}
.tag.coding{background:rgba(91,163,245,.1);color:#5ba3f5;border-color:rgba(91,163,245,.18)}
.tag.reasoning{background:rgba(168,100,255,.1);color:#a864ff;border-color:rgba(168,100,255,.18)}
.tag.creative{background:rgba(240,180,41,.1);color:#f0b429;border-color:rgba(240,180,41,.18)}
.tag.fast{background:rgba(15,190,132,.08);color:#0fbe84;border-color:rgba(15,190,132,.12)}
.tag.long{background:rgba(91,163,245,.08);color:#5ba3f5;border-color:rgba(91,163,245,.12)}
.tag.sel{box-shadow:0 0 0 2px currentColor}
.mp-list{flex:1;overflow-y:auto;padding:.5rem .75rem}
.mp-list::-webkit-scrollbar{width:3px}
.mp-list::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}
.mp-group{margin-bottom:.75rem}
.mp-group-name{font-size:.58rem;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.08em;padding:.2rem .375rem;margin-bottom:.25rem}
.mp-card{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .7rem;border-radius:var(--r2);cursor:pointer;border:1px solid transparent;transition:all .16s;margin-bottom:.2rem;-webkit-tap-highlight-color:transparent}
.mp-card:hover{background:var(--s2);border-color:var(--b)}
.mp-card.selected{background:var(--pd);border-color:rgba(15,190,132,.28)}
.mp-av{width:1.875rem;height:1.875rem;border-radius:.375rem;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0}
.mp-info{flex:1;min-width:0}
.mp-name{font-size:.75rem;font-weight:700;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.mp-tier{font-size:.6rem;opacity:.7}
.mp-id{font-size:.52rem;color:var(--mu);font-family:monospace;margin-top:.05rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp-str{font-size:.62rem;color:var(--mu);margin-top:.18rem;line-height:1.45}
.mp-wk{font-size:.6rem;color:#f0454566;margin-top:.1rem;line-height:1.4}
.mp-tags{display:flex;gap:.18rem;flex-wrap:wrap;margin-top:.28rem}
.mtag{padding:.08rem .3rem;border-radius:.2rem;font-size:.48rem;font-weight:700}
.mtag.free{background:rgba(15,190,132,.1);color:#0fbe84}
.mtag.coding{background:rgba(91,163,245,.1);color:#5ba3f5}
.mtag.reasoning{background:rgba(168,100,255,.1);color:#a864ff}
.mtag.creative{background:rgba(240,180,41,.1);color:#f0b429}
.mtag.fast{background:rgba(15,190,132,.08);color:#0fbe84}
.mtag.long{background:rgba(91,163,245,.08);color:#5ba3f5}
.mtag.smart{background:rgba(168,100,255,.08);color:#a864ff}
/* DASHBOARD */
.dash{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:1.75rem}
.dash::-webkit-scrollbar{width:3px}
.dash::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}
.sec-hd{font-size:.875rem;font-weight:700;color:var(--p);border-bottom:1px solid var(--b);padding-bottom:.35rem;margin:0 0 .75rem}
.mx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.6rem}
.mx-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r3);padding:.875rem;cursor:pointer;transition:border-color .18s,box-shadow .18s;display:flex;flex-direction:column;gap:.4rem;-webkit-tap-highlight-color:transparent}
.mx-card:hover,.mx-card:active{border-color:var(--p);box-shadow:0 0 12px var(--pg)}
.mxh{display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--b);padding-bottom:.4rem}
.mx-av{width:1.75rem;height:1.75rem;border-radius:.35rem;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.62rem;flex-shrink:0}
.mx-name{font-weight:700;font-size:.78rem}
.mx-sub{font-size:.58rem;color:var(--mu)}
.mx-prev{font-size:.73rem;color:var(--mu);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.eval-wrap{display:flex;flex-direction:column;gap:.45rem}
.eval-blk{background:var(--s2);padding:.75rem;border-radius:var(--r2);border:1px solid var(--b)}
.eval-blk h4{margin:0 0 .35rem;color:var(--p);font-size:.62rem;text-transform:uppercase;font-weight:700;letter-spacing:.06em}
.eval-blk p{margin:0;font-size:.78rem;white-space:pre-wrap;color:#d8eedb;line-height:1.65}
.wc-wrap{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:.75rem;padding:2rem 1rem;background:rgba(14,24,18,.4);border-radius:var(--r4);border:1px solid var(--b);min-height:130px}
.wc-word{transition:transform .2s;cursor:default;line-height:1}
.wc-word:hover{transform:scale(1.12)}
/* HISTORY */
.hist{flex:1;overflow-y:auto;padding:.75rem}
.hist::-webkit-scrollbar{width:3px}
.run-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r3);padding:.7rem .875rem;cursor:pointer;display:flex;align-items:flex-start;gap:.6rem;transition:border-color .18s;margin-bottom:.4rem;-webkit-tap-highlight-color:transparent}
.run-card:hover,.run-card:active{border-color:var(--p)}
.run-ico{width:1.875rem;height:1.875rem;border-radius:var(--r2);background:var(--pd);border:1px solid rgba(15,190,132,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.run-ico svg{width:.875rem;height:.875rem;stroke:var(--p);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.run-meta{flex:1;min-width:0}
.run-q{font-size:.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.run-d{font-size:.58rem;color:var(--mu);margin-top:.13rem}
.run-bd{display:flex;gap:.25rem;flex-shrink:0;align-items:flex-start}
.rbg{font-size:.48rem;padding:.13rem .38rem;border-radius:var(--r1);background:var(--pd);color:var(--p);font-weight:700;border:1px solid rgba(15,190,132,.12)}
.hist-empty{color:var(--mu);text-align:center;padding:3rem 1rem;font-size:.8rem}
/* READER */
.rnd-sep{font-size:.52rem;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .38rem;display:flex;align-items:center;gap:.4rem}
.rnd-sep::after{content:'';flex:1;height:1px;background:var(--b)}
.rb{background:var(--bg);border:1px solid var(--b);border-radius:var(--r2);margin-bottom:.45rem;overflow:hidden}
.rb-hd{display:flex;align-items:center;justify-content:space-between;padding:.42rem .65rem;border-bottom:1px solid var(--b);background:var(--s2);gap:.38rem}
.rb-info{display:flex;align-items:center;gap:.38rem;min-width:0;flex:1}
.rb-role{font-size:.58rem;font-weight:700;text-transform:uppercase;flex-shrink:0}
.rb-mdl{font-size:.5rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-warn{font-size:.48rem;color:var(--warn);flex-shrink:0}
.rb-body{padding:.7rem .7rem;white-space:pre-wrap;font-size:.8rem;line-height:1.8;color:#d8eedb;word-break:break-word}
/* DIALOGS */
dialog{background:var(--s1);color:var(--txt);border:1px solid var(--b);border-radius:var(--r4);padding:0;width:95vw;max-width:700px;max-height:92dvh;box-shadow:0 30px 80px rgba(0,0,0,.85);margin:auto}
dialog::backdrop{background:rgba(0,0,0,.78);backdrop-filter:blur(6px)}
.dlg-hd{padding:.7rem 1rem;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;gap:.5rem;background:var(--s1);border-radius:var(--r4) var(--r4) 0 0;position:sticky;top:0;z-index:2}
.dlg-hd h2{margin:0;font-size:.875rem;color:var(--p);font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dlg-hd-r{display:flex;gap:.3rem;align-items:center;flex-shrink:0}
.dlg-body{padding:1rem;overflow-y:auto;max-height:calc(92dvh - 6.5rem)}
.dlg-body::-webkit-scrollbar{width:3px}
.dlg-body::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}
.dlg-ft{padding:.7rem 1rem;border-top:1px solid var(--b);display:flex;justify-content:flex-end;gap:.5rem}
.mp-dlg-body{padding:0!important;display:flex;flex-direction:column;max-height:calc(92dvh - 4.5rem)}
/* FORMS */
.fg{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.875rem}
.fg label{font-size:.58rem;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{background:var(--bg);border:1px solid var(--b);color:var(--txt);padding:.58rem .8rem;border-radius:var(--r2);font-family:var(--font);font-size:.8rem;width:100%;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--p)}
optgroup{background:#14231c;color:var(--mu);font-weight:700}
.cur-mdl-row{display:flex;align-items:center;justify-content:space-between;padding:.45rem .7rem;background:var(--pd);border:1px solid rgba(15,190,132,.18);border-radius:var(--r2);margin-bottom:.75rem;gap:.5rem}
.cur-mdl-name{font-size:.72rem;font-weight:700;color:var(--p);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* TOAST */
#toasts{position:fixed;right:.75rem;bottom:calc(var(--bn) + .625rem + var(--sb));z-index:9999;display:flex;flex-direction:column-reverse;gap:.3rem;pointer-events:none;max-width:270px}
.toast{background:var(--s1);border:1px solid var(--b);color:var(--txt);padding:.5rem .875rem;border-radius:var(--r2);font-size:.72rem;font-weight:600;box-shadow:0 10px 28px rgba(0,0,0,.6);display:flex;align-items:center;gap:.4rem;animation:tIn .2s ease;pointer-events:auto}
.toast.ok{border-color:var(--p)}.toast.err{border-color:var(--err)}.toast.info{border-color:var(--warn)}
.tpip{width:.32rem;height:.32rem;border-radius:50%;flex-shrink:0}
.toast.ok .tpip{background:var(--p)}.toast.err .tpip{background:var(--err)}.toast.info .tpip{background:var(--warn)}

  const d=new Date(ts),now=new Date(),yd=new Date(now);yd.setDate(now.getDate()-1);

  if(d.toDateString()===now.toDateString())return'Heute '+t;
  if(d.toDateString()===yd.toDateString())return'Gestern '+t;
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'2-digit'})+' '+t;
}

async function copyText(text,label='Text'){

/* ── API ADAPTER ────────────────────────────────────────────────────── */
class Api{
  static async fetchModels(){
    try{const r=await fetch('https://openrouter.ai/api/v1/models');if(!r.ok)throw 0;return(await r.json()).data||[];}catch{return[];}
  }
  static async call(modelId,messages,opts={}){
    if(!State.s.api)throw new Error('API-Key fehlt – bitte in Settings eintragen.');
    const{seatIdx=null,timeoutMs=90000}=opts;
    let model=modelId,retries=0,isFb=false;
    while(retries<=4){
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
      try{
        const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
          method:'POST',signal:ctrl.signal,
          headers:{'Authorization':`Bearer ${State.s.api}`,'Content-Type':'application/json','HTTP-Referer':location.href,'X-Title':'KI-Stammtisch Pro'},
          body:JSON.stringify({model,messages,temperature:0.75,max_tokens:2048})
        });
        clearTimeout(timer);
        if(r.status===429){
          retries++;
          if(retries>4)throw new Error('Rate-Limit: Max-Retries erreicht.');
          const ra=parseInt(r.headers.get('Retry-After')||'0')||0;
          const jitter=Math.random()*800;
          const wait=ra>0?(ra*1000+jitter):Math.min((2**retries)*1200+jitter,32000);
          UI.log(`⏳ Rate-Limit [${model.split('/').pop()}]. Warte ${Math.round(wait/1000)}s…`);
          if(seatIdx!==null)UI.badge(seatIdx,`Warten ${Math.round(wait/1000)}s`,'warn');
          await pause(wait);continue;
        }
        if(!r.ok){
          let em=r.statusText;
          try{em=(await r.json())?.error?.message||em;}catch{}
          const fb=State.s.summarizer;
          if(!fb)throw new Error(`Fehler ${r.status}: ${em}`);
          if(model===fb)throw new Error(`Fallback [${fb}] ebenfalls fehlgeschlagen: ${em}`);
          UI.log(`⚠ Fehler [${model.split('/').pop()}]: ${em} → Fallback`);
          if(seatIdx!==null)UI.badge(seatIdx,'⚠ Fallback','warn',true);
          model=fb;isFb=true;retries++;
          await pause(1800+Math.random()*600);continue;
        }
        const data=await r.json();
        const content=data.choices?.[0]?.message?.content;
        if(!content&&content!=='')throw new Error('Leere API-Antwort.');
        if(seatIdx!==null&&!isFb)UI.badge(seatIdx,'','',false,true);
        return{content,usedModel:model,isFallback:isFb};
      }catch(e){
        clearTimeout(timer);
        if(e.name==='AbortError'){
          retries++;
          if(retries>4)throw new Error(`Timeout nach ${timeoutMs/1000}s.`);
          UI.log(`⏱ Timeout [${model.split('/').pop()}] – Retry ${retries}…`);
          await pause(2000);continue;
        }
        if(retries>=4)throw e;
        retries++;await pause(1500+Math.random()*500);
      }
    }
    throw new Error('Unbekannter API-Fehler nach max Retries.');
  }
}

/* ── STATE ──────────────────────────────────────────────────────────── */
class State{
  static s={api:'',rounds:3,summarizer:'meta-llama/llama-3.3-70b-instruct'};
  static seats=[
    {role:'Analyst',model:'google/gemini-2.5-flash',prompt:'Fokussiere dich auf Fakten und Daten. Sei präzise und strukturiert.',context:'Bleibe sachlich.'},
    {role:'Kritiker',model:'anthropic/claude-sonnet-4.6',prompt:'Suche logische Lücken, Widersprüche und blinde Flecken.',context:'Sei konstruktiv-kritisch.'},
    {role:'Visionär',model:'openai/gpt-5',prompt:'Denke unkonventionell, kreativ und zukunftsorientiert.',context:'Ignoriere scheinbare Limits.'},
    {role:'Synthetisierer',model:'deepseek/deepseek-v3.2',prompt:'Verbinde die Ideen anderer zu einem kohärenten Ganzen.',context:'Denke integrativ.'},
    {role:'Risikoprüfer',model:'mistralai/mistral-large',prompt:'Bewerte Risiken, Nebenwirkungen und mögliche Fehler.',context:'Worst-Case-Fokus.'}
  ];
  static history=[];
  static db=null;
  static async init(){
    return new Promise(res=>{
      const req=indexedDB.open('KIStammtischV3',1);
      req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('state'))db.createObjectStore('state');if(!db.objectStoreNames.contains('runs'))db.createObjectStore('runs',{keyPath:'id',autoIncrement:true});};
      req.onsuccess=async e=>{this.db=e.target.result;await this.load();res();};
      req.onerror=()=>res();
    });
  }
  static async load(){
    return new Promise(res=>{
      try{
        const tx=this.db.transaction('state','readonly');const st=tx.objectStore('state');
        let n=2,done=()=>{if(!--n)res();};
        st.get('settings').onsuccess=e=>{if(e.target.result)this.s={...this.s,...e.target.result};done();};
        st.get('seats').onsuccess=e=>{if(e.target.result?.length)this.seats=e.target.result;done();};
      }catch{res();}
    });
  }
  static async save(){
    if(!this.db)return;
    const tx=this.db.transaction('state','readwrite');const st=tx.objectStore('state');
    st.put(this.s,'settings');st.put(this.seats,'seats');
  }
  static async saveRun(query,evalData){
    if(!this.db)return;
    return new Promise(res=>{const tx=this.db.transaction('runs','readwrite');tx.objectStore('runs').put({ts:Date.now(),query,history:[...this.history],eval:evalData});tx.oncomplete=res;});
  }
  static async loadRuns(n=10){
    if(!this.db)return[];
    return new Promise(res=>{
      const req=this.db.transaction('runs','readonly').objectStore('runs').openCursor(null,'prev');
      const runs=[];
      req.onsuccess=e=>{const c=e.target.result;if(c&&runs.length<n){runs.push(c.value);c.continue();}else res(runs);};
      req.onerror=()=>res([]);
    });
  }
}

/* ── ENGINE ─────────────────────────────────────────────────────────── */
class Engine{
  static async run(){
    const query=(q('inpD').value||q('inpM').value).trim();
    if(!query){Toast.show('Bitte eine Frage eingeben!','info');return;}
    if(!State.s.api){Toast.show('API-Key in Settings eintragen!','err');q('dlgSettings').showModal();return;}
    UI.setRunning(true);UI.resetDash();State.history=[];let summary='';
    try{
      for(let r=1;r<=State.s.rounds;r++){
        if(r>=3&&State.history.length){
          UI.log(`[R${r}] Erstelle Zusammenfassung…`);
          const payload=State.history.map(h=>`[${h.role}]: ${h.content}`).join('\n\n');
          const sr=await Api.call(State.s.summarizer,[
            {role:'system',content:'Du bist ein präziser Kontext-Bewahrer. Fasse alle Beiträge neutral zusammen. Max 300 Wörter.'},
            {role:'user',content:payload}
          ]);
          summary=sr.content;
          State.history.push({round:'Sys',role:'Summarizer',content:summary,model:sr.usedModel,isFallback:false});
          await pause(1500);
        }
        for(let i=0;i<State.seats.length;i++){
          const seat=State.seats[i];
          UI.setSeat(i,true);
          UI.log(`[R${r}] ${seat.role} (${mdlName(seat.model)})…`);
          let userMsg;
          if(r===1){
            userMsg=query;
          }else if(r===2){
            const prev=State.history.filter(h=>h.round===1).map(h=>`**${h.role}:** ${h.content}`).join('\n\n');
            userMsg=`Frage: ${query}\n\nRunde 1 – alle Beiträge:\n${prev}\n\nBaue auf den Beiträgen auf und erweitere sie aus deiner Rolle (${seat.role}).`;
          }else{
            userMsg=`Frage: ${query}\n\nKonsens-Zusammenfassung:\n${summary}\n\nFinaler Beitrag aus deiner Rolle (${seat.role}):`;
          }
          const res=await Api.call(seat.model,[
            {role:'system',content:`${seat.prompt}\n${seat.context}\nRolle: ${seat.role}. Sei prägnant aber tiefgründig. Max 500 Wörter.`},
            {role:'user',content:userMsg}
          ],{seatIdx:i});
          State.history.push({round:r,role:seat.role,content:res.content,model:res.usedModel,isFallback:res.isFallback});
          UI.setSeat(i,false);
          await pause(700+Math.random()*500);
        }
      }
      UI.log('Erstelle Evaluation…');
      const evalText=State.history.filter(h=>h.role!=='Summarizer').map(h=>`[${h.role}|R${h.round}]: ${h.content}`).join('\n\n');
      const evRes=await Api.call(State.s.summarizer,[
        {role:'system',content:'Analysiere die Diskussion. Antworte NUR als gültiges JSON (keine Backticks). Keys: "Konsens","Konflikte","KeyTakeaways" (Array),"Stimmung".'},
        {role:'user',content:evalText}
      ]);
      UI.renderEval(evRes.content);
      await State.saveRun(query,evRes.content);
      UI.renderMatrix();UI.renderWC();
      UI.log('✓ Lauf abgeschlossen!');
      Toast.show('Diskussion beendet! 🎉','ok');
      UI.switchView('vDash');
    }catch(e){
      Toast.show('Fehler: '+e.message,'err',8000);
      UI.log('Abbruch: '+e.message);
    }finally{UI.setRunning(false);}
  }
}

const Picker={

      const el=document.createElement('button');
      el.className=`tag ${t.cls}${this.activeTags.has(t.id)?' sel':''}`;

    });
  }

    const freq={};tokens.forEach(t=>{if(!STOP.has(t))freq[t]=(freq[t]||0)+1;});
    const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,40);

        const uid=`rb${Math.random().toString(36).slice(2)}`;
        const mdl=mdlById(h.model);const color=mdl?.color||'var(--p)';
        html+=`<div class="rb"><div class="rb-hd"><div class="rb-info"><span class="rb-role" style="color:${color}">${esc(h.role)}</span><span class="rb-mdl">${esc(mdl?.name||h.model.split('/').pop())}</span>${h.isFallback?'<span class="rb-warn">⚠ Fallback</span>':''}</div><button class="btn-c" data-cid="${uid}"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Kopieren</button></div><div class="rb-body" id="${uid}">${esc(h.content)}</div></div>`;
      });
    });
    return html;
  },
  _wireReader(body){
    body.querySelectorAll('[data-cid]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const text=q(btn.dataset.cid)?.textContent||'';
        const role=btn.closest('.rb')?.querySelector('.rb-role')?.textContent||'Antwort';
        copyText(text,role);btn.textContent='✓ Kopiert';
        setTimeout(()=>{btn.innerHTML='<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Kopieren';},1800);
      });
    });
  },
  openReader(filterRole,history){
    const items=filterRole==='__all__'?history.filter(h=>h.role!=='Summarizer'):history.filter(h=>h.role===filterRole);
    q('rTitle').textContent=filterRole==='__all__'?'Gesamte Diskussion':`Akte: ${filterRole}`;
    const body=q('rBody');body.innerHTML=this._buildReader(items);this._wireReader(body);
    q('dlgReader').showModal();
  },
  async renderHist(){
    const list=q('histL');list.innerHTML='<div class="hist-empty" style="opacity:.5">Lade…</div>';
    const runs=await State.loadRuns(10);
    if(!runs.length){list.innerHTML='<div class="hist-empty">Noch keine Läufe gespeichert.</div>';return;}
    list.innerHTML='<div style="padding:.25rem 0 .75rem;font-size:.72rem;font-weight:700;color:var(--p)">Letzte '+runs.length+' Läufe</div>';
    runs.forEach(run=>{
      const roles=[...new Set((run.history||[]).filter(h=>h.role!=='Summarizer').map(h=>h.role))];
      const rns=[...new Set((run.history||[]).map(h=>h.round).filter(r=>r!=='Sys'))];
      const card=document.createElement('div');card.className='run-card';
      card.innerHTML=`<div class="run-ico"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="run-meta"><div class="run-q" title="${esc(run.query)}">${esc(run.query)}</div><div class="run-d">${fmtDate(run.ts)}</div></div><div class="run-bd"><span class="rbg">R${rns.length}</span><span class="rbg">${roles.length} KIs</span></div>`;
      card.addEventListener('click',()=>{
        const items=(run.history||[]).filter(h=>h.role!=='Summarizer');
        q('rTitle').textContent=run.query.slice(0,60)+(run.query.length>60?'…':'');
        const body=q('rBody');body.innerHTML=this._buildReader(items);this._wireReader(body);
        q('dlgReader').showModal();
      });
      list.append(card);
    });
  }
};

/* ── BOOTSTRAP ──────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',async()=>{
  await State.init();
  UI.init();
  if(!State.s.api)setTimeout(()=>Toast.show('API-Key in ⚙ Settings eintragen','info',5000),800);
});
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
